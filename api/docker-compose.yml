version: '3.9'

services:
  api:
    build: 
      context: ./
      dockerfile: ./docker/Dockerfile
    ports:
      - "5050:5050"
    environment:
      - TOKEN_SECRET_KEY=dev
      - PORT=5050      
    networks:
      - api-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "500m"
    
  db:
    image: postgres:latest
    ports:
      - "5433:5433"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - ./api/db/db-data:/var/lib/postgresql/data
      - ./api/db/postgres.cnf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf -p 5433  # Ensure the config is properly loaded
    networks:
      - api-network

networks:
  api-network:
    driver: bridge    